name: rocq-python-extraction CI

on:
  push:
    branches: [main]
    paths:
      - 'rocq-python-extraction/**'
      - '.github/workflows/rocq-python-extraction.yml'
  pull_request:
    paths:
      - 'rocq-python-extraction/**'
      - '.github/workflows/rocq-python-extraction.yml'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up OCaml / opam
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: "5.3"

      - name: Install dependencies
        run: opam install -y --deps-only rocq-python-extraction/rocq-python-extraction.opam

      - name: Build and test
        run: opam exec -- make -C rocq-python-extraction test
